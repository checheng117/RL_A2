# Merge: base.yaml + data.yaml + this file

experiment_name: "grpo_v1_3090"

training:
  stage: "grpo"
  output_subdir: "grpo_v1_3090"
  # English mainline: merged full SFT (GRPO adds fresh LoRA on top in code).
  sft_adapter_path: "outputs/checkpoints/sft_full_3090/best"
  reward_variant: "v1"
  max_seq_length: 768
  max_prompt_length: 512
  max_completion_length: 256
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_generations: 2
  learning_rate: 1.0e-5
  num_train_epochs: 1
  logging_steps: 5
  save_steps: 50
  save_total_limit: 2
  beta: 0.04
  max_steps: -1
  smoke_test: false
  smoke_max_samples: 16
  smoke_max_steps: 2
  dry_run: false
  evaluate_only: false
  resume_from_checkpoint: null

data:
  train_file: "data/processed/grpo_train.jsonl"
  validation_file: "data/processed/grpo_val.jsonl"
  test_file: "data/processed/grpo_test.jsonl"
